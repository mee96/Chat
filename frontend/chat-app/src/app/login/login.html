<div class="login-wrap">
  <div class="login-card">
    <div class="login-deco">✦ ✧ ✦</div>
    <div class="login-title">benvinguda!</div>
    <div class="login-sub">quin és el teu nom?</div>
    <input

      class="login-input"
      [(ngModel)]="username"

      placeholder="el teu nom..." />

  </div>
</div>
